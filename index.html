<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PNG → SVG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>PNG → SVG</h2>

<!-- ドロップ -->
<div id="dropArea">ここに画像をドロップ or クリック</div>
<input type="file" id="fileInput" accept="image/png" hidden>

<!-- プリセット -->
<div>
  <button onclick="setPreset('logo')">ロゴ</button>
  <button onclick="setPreset('photo')">写真</button>
  <button onclick="setPreset('icon')">アイコン</button>
</div>

<br>
<button onclick="convert()">変換</button>

<!-- 高度設定 -->
<details>
  <summary>高度設定</summary>
  <p class="note">より高度なSVGを求める場合のみ変更してください</p>

  色数: <span id="colorVal">16</span><br>
  <input type="range" id="colors" min="2" max="64" value="16"><br>

  細かさ<br>
  <input type="range" id="ltres" min="0.5" max="5" step="0.5" value="1"><br>

  滑らかさ<br>
  <input type="range" id="qtres" min="0.5" max="5" step="0.5" value="1"><br>

  ノイズ除去<br>
  <input type="range" id="pathomit" min="0" max="20" value="8"><br>

  色簡略化<br>
  <input type="range" id="mincolorratio" min="0" max="0.05" step="0.005" value="0.005"><br>

  <select id="mode">
    <option value="color">カラー</option>
    <option value="bw">白黒</option>
  </select><br><br>

  <label>
    <input type="checkbox" id="optimize" checked>
    SVG最適化（軽量化）
  </label>

</details>

<!-- ローディング -->
<div id="loading" style="display:none;">
  <div class="spinner"></div>
  <p>変換中...</p>
</div>

<!-- 比較 -->
<div id="compare">
  <div>
    <p>元画像</p>
    <img id="before">
  </div>
  <div>
    <p>SVG</p>
    <div id="preview"></div>
  </div>
</div>

<a id="download" style="display:none">SVGダウンロード</a>

<script src="https://unpkg.com/imagetracerjs"></script>
<script src="script.js"></script>

</body>
</html>
