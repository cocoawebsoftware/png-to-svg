<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PNG → SVG Vectorizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>PNG → SVG（ガチ変換）</h1>

<input type="file" id="fileInput" accept="image/png"><br><br>

<label>色数: <span id="colorValue">16</span></label><br>
<input type="range" min="2" max="64" value="16" id="colorRange"><br><br>

<button onclick="convert()">変換</button>

<h3>プレビュー</h3>
<div id="preview"></div>

<br>
<a id="download" style="display:none">SVGダウンロード</a>

<script src="https://unpkg.com/imagetracerjs"></script>
<script src="script.js"></script>

</body>
</html>
