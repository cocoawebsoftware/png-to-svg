<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PNGをSVGベクターに変換</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <!-- アップロード・プリセット -->
  <div class="card">
    <h2>PNG → SVG</h2>

    <div id="dropArea">画像をドロップ or クリック</div>
    <input type="file" id="fileInput" hidden>

    <div id="presets">
      <button class="preset-btn" data-preset="logo">ロゴ</button>
      <button class="preset-btn" data-preset="photo">写真</button>
      <button class="preset-btn" data-preset="icon">アイコン</button>
      <button class="preset-btn" id="customPreset" data-preset="custom">カスタム</button>
    </div>

    <div id="colorMode">
      <button class="mode-btn active" data-mode="color">カラー</button>
      <button class="mode-btn" data-mode="bw">白黒</button>
    </div>

    <button class="main-btn" onclick="convert()">変換</button>

    <label id="optLabel">
      <input type="checkbox" id="optimize" checked>
      SVG最適化（軽量化）
    </label>
  </div>

  <!-- 高度設定 -->
  <div class="card">
    <details id="advancedSettings">
      <summary>高度設定</summary>
      <p class="note">より高度なSVGを求める場合のみ変更してください</p>

      <div class="slider-container">
        <label>色数: <span id="colorsVal">16</span>
          <img src="Asset/Info.png" class="info-icon" data-info="SVGで使用する色の数です。">
        </label>
        <input type="range" id="colors" min="2" max="64" value="16">
      </div>

      <div class="slider-container">
        <label>細かさ
          <img src="Asset/Info.png" class="info-icon" data-info="細かいディテールをどの程度残すかを調整します。">
        </label>
        <input type="range" id="ltres" min="0.5" max="5" step="0.5" value="1">
      </div>

      <div class="slider-container">
        <label>滑らかさ
          <img src="Asset/Info.png" class="info-icon" data-info="曲線の滑らかさを調整します。">
        </label>
        <input type="range" id="qtres" min="0.5" max="5" step="0.5" value="1">
      </div>

      <div class="slider-container">
        <label>ノイズ除去
          <img src="Asset/Info.png" class="info-icon" data-info="不要なノイズをどれくらい除去するか調整します。">
        </label>
        <input type="range" id="pathomit" min="0" max="20" value="8">
      </div>

      <div class="slider-container">
        <label>色簡略化
          <img src="Asset/Info.png" class="info-icon" data-info="似た色をまとめる比率を設定します。">
        </label>
        <input type="range" id="mincolorratio" min="0" max="0.05" step="0.005" value="0.005">
      </div>

    </details>
  </div>

  <!-- 比較表示 -->
  <div class="card">
    <div id="compare">
      <div>
        <p>Before</p>
        <img id="before">
      </div>
      <div>
        <p>After</p>
        <div id="preview"></div>
      </div>
    </div>

    <div id="compareToggle">
      <button class="toggle-btn active" id="showBefore">Before</button>
      <button class="toggle-btn" id="showAfter">After</button>
    </div>

    <button id="download">
      <img src="Asset/Download.png" alt="Download SVG">
      <span>ダウンロード</span>
    </button>
  </div>

</div>

<script src="https://unpkg.com/imagetracerjs"></script>
<script src="script.js"></script>
</body>
</html>
