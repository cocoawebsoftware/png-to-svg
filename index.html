<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PNG → SVG</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="file" id="fileInput" accept="image/png"><br><br>

<label>色数</label>
<input type="range" id="colors" min="2" max="64" value="16"><br>

<label>細かさ</label>
<input type="range" id="ltres" min="0.5" max="5" step="0.5" value="1"><br>

<label>滑らかさ</label>
<input type="range" id="qtres" min="0.5" max="5" step="0.5" value="1"><br>

<label>ノイズ除去</label>
<input type="range" id="pathomit" min="0" max="20" value="8"><br>

<label>色簡略化</label>
<input type="range" id="mincolorratio" min="0" max="0.05" step="0.005" value="0.005"><br>

<select id="mode">
  <option value="color">カラー</option>
  <option value="bw">白黒</option>
</select><br><br>

<button onclick="convert()">変換</button>

<!-- 🔄 ローディング -->
<div id="loading" style="display:none;">
  <div class="spinner"></div>
  <p>変換中...</p>
</div>

<div id="preview"></div>
<a id="download" style="display:none">DL</a>

<script src="https://unpkg.com/imagetracerjs"></script>
<script src="script.js"></script>

</body>
</html>
